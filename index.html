<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Migración - Diener Law</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor-principal">
        <h1>Asistente de Llamadas - Diener Law</h1>
        
        <!-- FORMULARIO DE CAPTURA COMPLETO -->
        <form id="formularioMigracion">
            <div class="grupo-formulario">
                <label for="nombre">Nombre del Cliente:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej. David Padilla">
            </div>

            <div class="grupo-formulario">
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ej. 3222790974">
            </div>

            <div class="grupo-formulario">
                <label for="fechaNacimiento">Fecha de Nacimiento:</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento">
            </div>

            <div class="grupo-formulario">
                <label for="estadoCivil">Estado Civil:</label>
                <select id="estadoCivil" name="estadoCivil">
                    <option value="">--Selecciona--</option>
                    <option value="Soltero/a">Soltero/a</option>
                    <option value="Casado/a">Casado/a</option>
                    <option value="Unión Libre">Unión Libre</option>
                    <option value="Divorciado/a">Divorciado/a</option>
                </select>
            </div>

            <div class="grupo-formulario">
                <label for="fechaEntrada">Fecha de Entrada EE.UU:</label>
                <input type="date" id="fechaEntrada" name="fechaEntrada">
            </div>

            <div class="grupo-formulario">
                <label for="zohoUrl">URL de Zoho Desk:</label>
                <input type="url" id="zohoUrl" name="zohoUrl" placeholder="https://zoho.com...">
            </div>

            <div class="grupo-formulario">
                <label for="ticketId">ID del Ticket:</label>
                <input type="text" id="ticketId" name="ticketId" placeholder="Ej. TIKD-1234">
            </div>

            <div class="grupo-formulario">
                <label for="oficina">Oficina de la Cita:</label>
                <select id="oficina" name="oficina">
                    <option value="">--Selecciona Oficina--</option>
                    <option value="Phoenix">Phoenix</option>
                    <option value="Fontana">Fontana</option>
                    <option value="Santa Ana">Santa Ana</option>
                    <option value="Lynwood">Lynwood</option>
                </select>
            </div>

            <div class="grupo-formulario">
                <label for="fechaCita">Fecha de la Cita:</label>
                <input type="date" id="fechaCita" name="fechaCita">
            </div>

            <div class="grupo-formulario">
                <label for="horaCita">Hora de la Cita:</label>
                <input type="time" id="horaCita" name="horaCita">
            </div>

            <!-- CAMPO CONDICIONAL PARA JUSTIFICACIÓN DE FECHA LEJANA -->
            <div id="bloque_justificacion_fecha" class="campo-oculto" style="grid-column: span 2; background-color: #fffaf0; border-left: 4px solid #dd6b20; padding: 15px; display: none; margin-bottom: 10px;">
                <div class="grupo-formulario ancho-completo">
                    <label for="justificacionFecha" style="color: #dd6b20; font-weight: bold;">⚠️ Justificación: ¿Por qué no puede ir hoy, mañana o pasado mañana?</label>
                    <input type="text" id="justificacionFecha" placeholder="Ej. Cliente espera pago de nómina">
                </div>
            </div>
            <!-- SECCIÓN 1: PETICIÓN DE INMIGRACIÓN -->
            <div class="grupo-formulario ancho-completo">
                <label>¿Tiene alguna petición de inmigración anterior?</label>
                <div class="opciones-radio">
                    <label><input type="radio" name="peticion_inmi" value="SI" id="peticion_si"> Sí</label>
                    <label><input type="radio" name="peticion_inmi" value="NO" id="peticion_no" checked> No</label>
                </div>
            </div>

            <div id="bloque_peticion_extra" class="campo-oculto">
                <div class="grupo-formulario">
                    <label for="que_peticion">¿Qué petición es?</label>
                    <input type="text" id="que_peticion" placeholder="Ej. I-130, I-485">
                </div>
                <div class="grupo-formulario">
                    <label for="fecha_peticion">Fecha en que se inició:</label>
                    <input type="date" id="fecha_peticion">
                </div>
                <div class="grupo-formulario checkbox-grupo">
                    <input type="checkbox" id="tiene_evidencia">
                    <label for="tiene_evidencia">¿Tiene evidencia física/documentos?</label>
                </div>
                <div class="grupo-formulario" id="bloque_detalle_evidencia" style="display:none; margin-top:10px;">
                    <label for="que_evidencia">¿Qué evidencia o documentos tiene?</label>
                    <input type="text" id="que_evidencia" placeholder="Ej. Recibo de pago, cartas">
                </div>
            </div>

            <!-- SECCIÓN 2: DETENCIONES DE MIGRACIÓN -->
            <div class="grupo-formulario ancho-completo">
                <label>¿Ha tenido detenciones de migración?</label>
                <div class="opciones-radio">
                    <label><input type="radio" name="detenciones_inmi" value="SI" id="detenciones_si"> Sí</label>
                    <label><input type="radio" name="detenciones_inmi" value="NO" id="detenciones_no" checked> No</label>
                </div>
            </div>

            <div id="bloque_detenciones_extra" class="campo-oculto">
                <div class="grupo-formulario">
                    <label for="tiempo_detencion">¿Cuánto tiempo estuvo detenido/a?</label>
                    <input type="text" id="tiempo_detencion" placeholder="Ej. 3 días">
                </div>
                <div class="grupo-formulario">
                    <label for="fecha_detencion">Fecha aproximada de detención:</label>
                    <input type="date" id="fecha_detencion">
                </div>
                <div class="grupo-formulario ancho-completo" style="margin-top:10px;">
                    <label>¿Se le emitió una orden de deportación?</label>
                    <div class="opciones-radio">
                        <label><input type="radio" name="orden_dep_radio" value="SI" id="orden_dep_si"> Sí</label>
                        <label><input type="radio" name="orden_dep_radio" value="NO" id="orden_dep_no" checked> No</label>
                    </div>
                </div>
                <div class="grupo-formulario" id="bloque_fecha_deportacion" style="display:none;">
                    <label for="fecha_deportacion_orden">Fecha de la orden de deportación:</label>
                    <input type="date" id="fecha_deportacion_orden">
                </div>
            </div>

            <!-- SECCIÓN 3: FAMILIARES CIUDADANOS -->
            <div class="grupo-formulario ancho-completo">
                <label>¿Tiene familiares ciudadanos estadounidenses?</label>
                <div class="opciones-radio">
                    <label><input type="radio" name="familia_ciudadana" value="SI" id="fam_ciu_si"> Sí</label>
                    <label><input type="radio" name="familia_ciudadana" value="NO" id="fam_ciu_no" checked> No</label>
                </div>
            </div>

            <div id="bloque_fam_ciu_si" class="campo-oculto">
                <label>Selecciona los familiares ciudadanos:</label>
                <div class="checkbox-linea">
                    <label><input type="checkbox" class="check-familiar-ciu" id="fam_ciu_hijos" value="Hijos"> Hijos</label>
                    <label><input type="checkbox" class="check-familiar-ciu" value="Esposo/a"> Esposo/a</label>
                    <label><input type="checkbox" class="check-familiar-ciu" value="Padres"> Padres</label>
                    <label><input type="checkbox" class="check-familiar-ciu" value="Hermanos"> Hermanos</label>
                </div>
                <div id="bloque_hijos_ciu_detalles" style="display:none; margin-top:15px; background:#fff; padding:10px; border-radius:4px; border: 1px solid #cbd5e1;">
                    <div class="grupo-formulario"><label for="hijos_ciu_edad">Edad de los hijos:</label><input type="text" id="hijos_ciu_edad" placeholder="Ej. 18 años"></div>
                    <div class="grupo-formulario checkbox-grupo" style="margin-top:10px;">
                        <label>¿Tienen algún problema médico o espectro autista?</label>
                        <div class="opciones-radio">
                            <label><input type="radio" name="medico_hijos_ciu" value="SI" id="med_ciu_si"> Sí</label>
                            <label><input type="radio" name="medico_hijos_ciu" value="NO" id="med_ciu_no" checked> No</label>
                        </div>
                    </div>
                    <div id="bloque_diag_ciu" style="display:none; margin-top:5px;" class="grupo-formulario ancho-completo">
                        <label for="diagnostico_ciu">Detalle del diagnóstico médico:</label>
                        <input type="text" id="diagnostico_ciu" placeholder="Ej. Autismo severo">
                    </div>
                </div>
            </div>

            <div id="bloque_fam_ciu_no_comentarios" class="campo-oculto">
                <div class="grupo-formulario ancho-completo">
                    <label for="comentarios_fam_ciu">Comentarios sobre familia ciudadana (ej: sobrinos, tíos, etc.):</label>
                    <input type="text" id="comentarios_fam_ciu" placeholder="Notas sobre familiares no directos">
                </div>
            </div>

            <!-- SECCIÓN 4: FAMILIARES RESIDENTES PERMANENTES -->
            <div class="grupo-formulario ancho-completo">
                <label>¿Tiene familiares residentes legales permanentes?</label>
                <div class="opciones-radio">
                    <label><input type="radio" name="familia_residente" value="SI" id="fam_res_si"> Sí</label>
                    <label><input type="radio" name="familia_residente" value="NO" id="fam_res_no" checked> No</label>
                </div>
            </div>

            <div id="bloque_fam_res_si" class="campo-oculto">
                <label>Selecciona los familiares residentes:</label>
                <div class="checkbox-linea">
                    <label><input type="checkbox" class="check-familiar-res" id="fam_res_hijos" value="Hijos"> Hijos</label>
                    <label><input type="checkbox" class="check-familiar-res" value="Esposo/a"> Esposo/a</label>
                    <label><input type="checkbox" class="check-familiar-res" value="Padres"> Padres</label>
                </div>
                <div id="bloque_hijos_res_detalles" style="display:none; margin-top:15px; background:#fff; padding:10px; border-radius:4px; border: 1px solid #cbd5e1;">
                    <div class="grupo-formulario"><label for="hijos_res_edad">Edad de los hijos:</label><input type="text" id="hijos_res_edad" placeholder="Ej. 10 años"></div>
                    <div class="grupo-formulario checkbox-grupo" style="margin-top:10px;">
                        <label>¿Tienen algún problema médico o espectro autista?</label>
                        <div class="opciones-radio">
                            <label><input type="radio" name="medico_hijos_res" value="SI" id="med_res_si"> Sí</label>
                            <label><input type="radio" name="medico_hijos_res" value="NO" id="med_res_no" checked> No</label>
                        </div>
                    </div>
                    <div id="bloque_diag_res" style="display:none; margin-top:5px;" class="grupo-formulario ancho-completo">
                        <label for="diagnostico_res">Detalle del diagnóstico médico:</label>
                        <input type="text" id="diagnostico_res" placeholder="Ej. Diabetes tipo 1">
                    </div>
                </div>
            </div>

            <div id="bloque_fam_res_no_comentarios" class="campo-oculto">
                <div class="grupo-formulario ancho-completo">
                    <label for="comentarios_fam_res">Comentarios sobre familia residente (ej: sobrinos, tíos, etc.):</label>
                    <input type="text" id="comentarios_fam_res" placeholder="Notas sobre familiares no directos">
                </div>
            </div>

            <!-- SECCIÓN 5: CORTES DE MIGRACIÓN -->
            <div class="grupo-formulario ancho-completo">
                <label>¿Tiene próximas cortes de migración?</label>
                <div class="opciones-radio">
                    <label><input type="radio" name="cortes_inmi" value="SI" id="cortes_si"> Sí</label>
                    <label><input type="radio" name="cortes_inmi" value="NO" id="cortes_no" checked> No</label>
                </div>
            </div>

            <div id="bloque_cortes_si" class="campo-oculto">
                <div class="grupo-formulario">
                    <label for="fecha_corte_proxima">Fecha de la próxima corte:</label>
                    <input type="date" id="fecha_corte_proxima">
                </div>
                <div class="grupo-formulario ancho-completo" style="margin-top: 10px;">
            <!-- SECCIÓN 4: FAMILIARES RESIDENTES PERMANENTES -->
            <div class="grupo-formulario ancho-completo">
                <label>¿Tiene familiares residentes legales permanentes?</label>
                <div class="opciones-radio">
                    <label><input type="radio" name="familia_residente" value="SI" id="fam_res_si"> Sí</label>
                    <label><input type="radio" name="familia_residente" value="NO" id="fam_res_no" checked> No</label>
                </div>
            </div>

            <div id="bloque_fam_res_si" class="campo-oculto">
                <label>Selecciona los familiares residentes:</label>
                <div class="checkbox-linea">
                    <label><input type="checkbox" class="check-familiar-res" id="fam_res_hijos" value="Hijos"> Hijos</label>
                    <label><input type="checkbox" class="check-familiar-res" value="Esposo/a"> Esposo/a</label>
                    <label><input type="checkbox" class="check-familiar-res" value="Padres"> Padres</label>
                </div>
                <div id="bloque_hijos_res_detalles" style="display:none; margin-top:15px; background:#fff; padding:10px; border-radius:4px; border: 1px solid #cbd5e1;">
                    <div class="grupo-formulario"><label for="hijos_res_edad">Edad de los hijos:</label><input type="text" id="hijos_res_edad" placeholder="Ej. 10 años"></div>
                    <div class="grupo-formulario checkbox-grupo" style="margin-top:10px;">
                        <label>¿Tienen algún problema médico o espectro autista?</label>
                        <div class="opciones-radio">
                            <label><input type="radio" name="medico_hijos_res" value="SI" id="med_res_si"> Sí</label>
                            <label><input type="radio" name="medico_hijos_res" value="NO" id="med_res_no" checked> No</label>
                        </div>
                    </div>
                    <div id="bloque_diag_res" style="display:none; margin-top:5px;" class="grupo-formulario ancho-completo">
                        <label for="diagnostico_res">Detalle del diagnóstico médico:</label>
                        <input type="text" id="diagnostico_res" placeholder="Ej. Diabetes tipo 1">
                    </div>
                </div>
            </div>

            <div id="bloque_fam_res_no_comentarios" class="campo-oculto">
                <div class="grupo-formulario ancho-completo">
                    <label for="comentarios_fam_res">Comentarios sobre familia residente (ej: sobrinos, tíos, etc.):</label>
                    <input type="text" id="comentarios_fam_res" placeholder="Notas sobre familiares no directos">
                </div>
            </div>

            <!-- SECCIÓN 5: CORTES DE MIGRACIÓN -->
            <div class="grupo-formulario ancho-completo">
                <label>¿Tiene próximas cortes de migración?</label>
                <div class="opciones-radio">
                    <label><input type="radio" name="cortes_inmi" value="SI" id="cortes_si"> Sí</label>
                    <label><input type="radio" name="cortes_inmi" value="NO" id="cortes_no" checked> No</label>
                </div>
            </div>

            <div id="bloque_cortes_si" class="campo-oculto">
                <div class="grupo-formulario">
                    <label for="fecha_corte_proxima">Fecha de la próxima corte:</label>
                    <input type="date" id="fecha_corte_proxima">
                </div>
                <div class="grupo-formulario ancho-completo" style="margin-top: 10px;">
                    <label for="comentarios_corte_si">Comentarios / Notas de la próxima corte:</label>
                    <input type="text" id="comentarios_corte_si" placeholder="Ej. Corte master">
                </div>
            </div>

            <div id="bloque_cortes_no" class="campo-oculto">
                <div class="grupo-formulario ancho-completo">
                    <label>¿Ha perdido alguna corte de migración anteriormente?</label>
                    <div class="opciones-radio">
                        <label><input type="radio" name="perdido_corte" value="SI" id="perdido_si"> Sí</label>
                        <label><input type="radio" name="perdido_corte" value="NO" id="perdido_no" checked> No</label>
                    </div>
                </div>
                <div id="bloque_fecha_perdido" style="display:none; margin-top:10px;" class="grupo-formulario">
                    <label for="fecha_corte_perdida">Fecha aproximada de la corte perdida:</label>
                    <input type="date" id="fecha_corte_perdida">
                </div>
                <div class="grupo-formulario ancho-completo" style="margin-top: 15px; border-top: 1px dashed #cbd5e1; padding-top: 10px;">
                    <label>¿Ha revisado si se le abrió una orden de deportación por no asistir?</label>
                    <div class="opciones-radio">
                        <label><input type="radio" name="revisado_deportacion" value="SI" id="rev_dep_si"> Sí</label>
                        <label><input type="radio" name="revisado_deportacion" value="NO" id="rev_dep_no" checked> No</label>
                    </div>
                </div>
                <div id="bloque_fecha_orden_corte" style="display:none; margin-top:10px;">
                    <div class="grupo-formulario">
                        <label for="fecha_orden_corte_input">Fecha de la orden de deportación por corte:</label>
                        <input type="date" id="fecha_orden_corte_input">
                    </div>
                </div>
            </div>

            <!-- BOTÓN PROCESAR PRINCIPAL -->
            <div class="botones-container">
                <button type="button" id="btnProcesar" class="btn-primary">Procesar Mensajes Automáticos</button>
            </div>
        </form>

        <!-- CONTENEDOR DE RESULTADOS VISUALES -->
        <div class="contenedor-resultados">
            <h2>Resultados Listos para Copiar</h2>
            
            <div class="resultado-bloque">
                <label>Tag de Cita:</label>
                <div class="fila-copiado">
                    <div id="resultadoTag" class="caja-texto"></div>
                    <button type="button" id="btnCopiarTag" class="btn-copiar-corto">Copiar Tag</button>
                </div>
                <span id="alertaTag" class="mensaje-exito"></span>
            </div>

            <div class="resultado-bloque">
                <label>Mensaje SMS de Confirmación:</label>
                <div class="fila-copiado">
                    <div id="resultadoSms" class="caja-texto"></div>
                    <button type="button" id="btnCopiarSms" class="btn-copiar-corto">Copiar SMS</button>
                </div>
                <div id="contadorSmsWrapper" style="font-size:12px; font-weight:bold; margin-top:4px; color:#4a5568;">
                    Caracteres: <span id="contadorCaracteres">0</span>/160
                </div>
                <span id="alertaSms" class="mensaje-exito"></span>
            </div>

            <div class="resultado-bloque">
                <label>Historial Completo de Conversación (Notas):</label>
                <div class="fila-copiado" style="align-items: flex-start;">
                    <textarea id="resultadoHistorial" rows="8" readonly></textarea>
                    <button type="button" id="btnCopiarHistorial" class="btn-copiar-corto">Copiar Notas</button>
                </div>
                <span id="alertaHistorial" class="mensaje-exito"></span>
            </div>

            <div class="resultado-bloque">
                <label>Línea para Pegar en Google Sheets (Inicia en Columna A):</label>
                <div class="fila-copiado">
                    <input type="text" id="resultadoFilaExcel" readonly style="background-color: #e6fffa; border-left: 4px solid #319795; font-family: monospace;">
                    <button type="button" id="btnCopiarExcel" class="btn-copiar-corto" style="background-color: #319795;">Copiar Línea</button>
                </div>
                <span id="alertaExcel" class="mensaje-exito"></span>
            </div>
            
            <!-- EL ÚNICO BOTÓN LIMPIAR AL FINAL -->
            <div class="botones-container" style="margin-top: 25px;">
                <button type="button" id="btnLimpiar" class="btn-danger">Limpiar Todo para Siguiente Llamada</button>
            </div>
        </div> <!-- Cierre del contenedor-resultados -->
    </div> <!-- Cierre del contenedor-principal -->

    <script src="script.js"></script>
</body>
</html>
